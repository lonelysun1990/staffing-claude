# Manual agent eval — requires ANTHROPIC_API_KEY, Claude Agent SDK runtime, and Postgres.
# Scheduled runs are disabled by default (install claude-agent-sdk + CLI in the job image first).

name: Agent eval (manual)

on:
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: staffing
          POSTGRES_PASSWORD: staffing
          POSTGRES_DB: staffing_eval
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://staffing:staffing@localhost:5432/staffing_eval
      SECRET_KEY: test-secret-key-for-ci-only

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run eval cases
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m evals --all
